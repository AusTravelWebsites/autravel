ProxyPreserveHost On

Alias /.well-known /home/perth/public_html/.well-known
<Directory /home/perth/public_html/.well-known>
  Options None
  Require all granted
</Directory>

# Proxy everything to the autravel app via the haproxy load balancer (:3010),
# except /.well-known (left for cPanel AutoSSL, served by the Alias above).
#
# Uses a mod_rewrite [P] rule, NOT ProxyPass/ProxyPassMatch: LiteSpeed cannot
# parse a "!" in either a ProxyPassMatch negative-lookahead regex or a
# "ProxyPass /path !" exclusion — it logs "unknown proxy target protocol: !"
# and silently drops the directive, dropping the site to the cPanel default
# page. LiteSpeed honours mod_rewrite [P] reliably (it is how WordPress runs).
RewriteEngine On
RewriteCond %{REQUEST_URI} !^/\.well-known/
RewriteRule ^/?(.*)$ http://localhost:3010/$1 [P,L]
ProxyPassReverse / http://localhost:3010/
ProxyTimeout 300
