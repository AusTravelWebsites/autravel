ProxyPreserveHost On

Alias /.well-known /home/theaustralian/public_html/.well-known
<Directory /home/theaustralian/public_html/.well-known>
  Options None
  Require all granted
</Directory>

# Proxy everything to the autravel app via the haproxy load balancer (:3010),
# except /.well-known (cPanel AutoSSL). mod_rewrite [P] — LiteSpeed can't parse
# a ProxyPass "!" exclusion. Same template as the other autravel tenants.
RewriteEngine On
RewriteCond %{REQUEST_URI} !^/\.well-known/
RewriteRule ^/?(.*)$ http://localhost:3010/$1 [P,L]
ProxyPassReverse / http://localhost:3010/
ProxyTimeout 300
