ProxyPreserveHost On

Alias /.well-known /home/qldtravel/public_html/.well-known
<Directory /home/qldtravel/public_html/.well-known>
  Options None
  Require all granted
</Directory>

# Negative lookahead: proxy EVERY path EXCEPT those starting with wp-content,
# wp-includes or .well-known. LiteSpeed evaluates ProxyPassMatch regex on the
# request URI before any static-file fallback, so paths that don't match stay
# with Apache/LSWS to be served from DocumentRoot.
ProxyPassMatch ^/(?!wp-content|wp-includes|\.well-known)(.*)$ http://localhost:3001/$1
ProxyPassReverse / http://localhost:3001/
ProxyTimeout 300
